<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetFly Premium Rentals</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#000;
    color:#fff;
    overflow:hidden;
}

/* Animated Background */

body::before{
    content:'';
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1920') center/cover no-repeat;
    animation:zoomBg 20s infinite alternate ease-in-out;
    filter:brightness(.35);
    z-index:-2;
}

@keyframes zoomBg{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.1);
    }
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
    z-index:-1;
}

/* Main Container */

.container{
    width:90%;
    height:85vh;
    margin:50px auto;
    padding:40px;
    border-radius:30px;
    border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(18px);
}

/* Navbar */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.logo{
    font-size:42px;
    font-weight:700;
}

.menu{
    display:flex;
    gap:35px;
}

.menu a{
    color:white;
    text-decoration:none;
    transition:.3s;
}

.menu a:hover{
    color:#00d26a;
}

/* Search */

.search-container{
    display:flex;
    gap:10px;
}

.search{
    width:220px;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.3);
    background:rgba(255,255,255,.05);
    color:white;
    outline:none;
}

.search::placeholder{
    color:#bbb;
}

.search-btn-nav{
    padding:14px 20px;
    border:none;
    border-radius:12px;
    background:#00d26a;
    color:white;
    cursor:pointer;
    font-weight:600;
}

/* Hero */

.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:50px;
}

.left{
    width:45%;
}

.left h1{
    font-size:68px;
    margin-bottom:20px;
}

.left p{
    margin-bottom:30px;
    opacity:.8;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    padding:12px 22px;
    background:transparent;
    border:1px solid rgba(255,255,255,.2);
    color:white;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.tab:hover{
    background:#00d26a;
}

.form-box{
    padding:25px;
    border-radius:20px;
    background:rgba(0,0,0,.3);
    border:1px solid rgba(255,255,255,.1);
}

.form-box input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,.08);
    color:white;
}

.search-now{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#00d26a;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* Car Image */

.car{
    width:50%;
    display:flex;
    justify-content:center;
}

.car img{
    width:90%;
    border-radius:20px;
    animation:floatCar 3s ease-in-out infinite alternate;
    box-shadow:0 0 40px rgba(255,255,255,.15);
}

@keyframes floatCar{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-15px);
    }
}

/* Bottom Links */

.bottom-links{
    position:absolute;
    bottom:50px;
    right:100px;
    display:flex;
    gap:30px;
}

.bottom-links a{
    color:white;
    text-decoration:none;
}

/* Modal */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
}

.modal-content{
    width:450px;
    background:#111;
    padding:30px;
    border-radius:20px;
}

.modal-content h2{
    margin-bottom:20px;
}

.modal-content input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}

.modal-content button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00d26a;
    color:white;
    cursor:pointer;
}

.close{
    float:right;
    font-size:28px;
    cursor:pointer;
}

@media(max-width:1000px){

.hero{
    flex-direction:column;
}

.left,.car{
    width:100%;
}

.left h1{
    font-size:48px;
}

.car img{
    width:100%;
    margin-top:40px;
}

.bottom-links{
    display:none;
}

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

<nav>

<div class="logo">FleetFly</div>

<div class="menu">
    <a href="#">Home</a>
    <a href="https://www.enterprise.com" target="_blank">Services</a>
    <a href="https://www.hertz.com" target="_blank">Cars</a>
    <a href="contact.html">Contact</a>
</div>

<div class="search-container">

<input
type="text"
id="carSearch"
class="search"
placeholder="Search Cars...">

<button
class="search-btn-nav"
onclick="searchGoogle()">
Search
</button>

</div>

</nav>

<div class="hero">

<div class="left">

<h1>Premium Car Rental Services</h1>

<p>
Affordable and flexible car rentals for every journey.
Choose from a wide range of premium vehicles.
</p>

<div class="tabs">
<button class="tab" onclick="openModal()">Distance</button>
<button class="tab" onclick="openModal()">Hourly</button>
<button class="tab" onclick="openModal()">Flat Rate</button>
</div>

<div class="form-box">

<input type="text" id="pickup" placeholder="Pickup Address">

<input type="text" id="drop" placeholder="Drop Address">

<input type="date" id="travelDate">

<button class="search-now" onclick="findRentalCars()">
Find Rental Cars
</button>

</div>

</div>

<div class="car">
<img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=1000" alt="Luxury Car">
</div>

</div>

<div class="bottom-links">
<a href="https://www.enterprise.com" target="_blank">SEARCH</a>
<a href="https://www.hertz.com" target="_blank">BOOK</a>
<a href="https://www.avis.com" target="_blank">ENJOY</a>
</div>

</div>

<!-- Booking Modal -->

<div class="modal" id="bookingModal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h2>Book Your Ride</h2>

<input type="text" placeholder="Pickup Address">
<input type="text" placeholder="Drop Address">
<input type="date">
<input type="text" placeholder="Vehicle Type">
<input type="number" placeholder="Passengers">

<button onclick="submitBooking()">
Confirm Booking
</button>

</div>

</div>

<!-- External JavaScript File -->

<script src="js/script.js"></script>

</body>
</html>
